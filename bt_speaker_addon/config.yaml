name: "BT Speaker"
version: "0.1.0"
slug: "bt_speaker"
description: "Bluetooth A2DP speaker controller"
arch: [aarch64, amd64]

# Accès au dbus de l'hôte (BlueZ)
host_dbus: true

# Réseau hôte requis pour les sockets Bluetooth
host_network: true

# Accès aux devices Bluetooth du système
devices:
  - /dev/bus

# Capacités Linux nécessaires
privileged:
  - NET_ADMIN
  - SYS_ADMIN

# Port exposé pour l'API REST (consommée par l'intégration custom)
ports:
  8765/tcp: 8765

ports_description:
  8765/tcp: "API REST interne"

# Options configurables depuis l'UI HA
options:
  speaker_mac: ""
  auto_reconnect: true
  poll_interval: 10

schema:
  speaker_mac: str
  auto_reconnect: bool
  poll_interval: int(1,60)