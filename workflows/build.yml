name: Build & Publish Add-on

on:
  push:
    tags:
      - "v*"          # Déclenché sur : git tag v0.1.0 && git push --tags

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - amd64
          - aarch64    # Raspberry Pi 4
          - armhf
          - armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: QEMU (cross-compilation ARM)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ./bt_speaker_addon
          push: true
          platforms: linux/${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:bookworm
          tags: |
            ghcr.io/${{ github.repository_owner }}/bt-speaker-addon-${{ matrix.arch }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/bt-speaker-addon-${{ matrix.arch }}:latest