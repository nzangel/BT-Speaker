scan:
  name: Scanner les enceintes Bluetooth
  description: >
    Déclenche un scan Bluetooth et stocke les appareils
    trouvés dans les attributs de l'entité media_player.
  fields:
    duration:
      name: Durée du scan
      description: Durée du scan en secondes (défaut 10)
      required: false
      default: 10
      selector:
        number:
          min: 5
          max: 30
          unit_of_measurement: s

connect:
  name: Connecter une enceinte
  description: >
    Connecte (et paire si nécessaire) une enceinte
    par son adresse MAC.
  fields:
    mac:
      name: Adresse MAC
      description: "Ex: AA:BB:CC:DD:EE:FF"
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:

disconnect:
  name: Déconnecter l'enceinte
  description: Déconnecte l'enceinte Bluetooth active.